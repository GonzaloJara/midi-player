<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#12121f"/>

  <!-- Note bars on the roll -->
  <rect x="4"  y="5"  width="10" height="3" rx="1" fill="#4fc3f7"/>
  <rect x="17" y="5"  width="8"  height="3" rx="1" fill="#f06292"/>
  <rect x="7"  y="10" width="12" height="3" rx="1" fill="#81c784"/>
  <rect x="3"  y="15" width="7"  height="3" rx="1" fill="#ffb74d"/>
  <rect x="13" y="15" width="11" height="3" rx="1" fill="#ce93d8"/>

  <!-- Playhead -->
  <rect x="14.5" y="3" width="2" height="18" rx="1" fill="rgba(255,60,60,0.85)"/>

  <!-- Piano keys strip at bottom -->
  <rect x="0" y="24" width="32" height="8" fill="#1a1a30"/>

  <!-- White keys -->
  <rect x="1"  y="24.5" width="3.5" height="6.5" rx="1" fill="#dde0ee"/>
  <rect x="5.5" y="24.5" width="3.5" height="6.5" rx="1" fill="#dde0ee"/>
  <rect x="10"  y="24.5" width="3.5" height="6.5" rx="1" fill="#dde0ee"/>
  <rect x="14.5" y="24.5" width="3.5" height="6.5" rx="1" fill="#dde0ee"/>
  <rect x="19"  y="24.5" width="3.5" height="6.5" rx="1" fill="#dde0ee"/>
  <rect x="23.5" y="24.5" width="3.5" height="6.5" rx="1" fill="#dde0ee"/>
  <rect x="28"  y="24.5" width="3"   height="6.5" rx="1" fill="#dde0ee"/>

  <!-- Black keys -->
  <rect x="3.5"  y="24.5" width="2.5" height="4" rx="0.5" fill="#12121f"/>
  <rect x="8"    y="24.5" width="2.5" height="4" rx="0.5" fill="#12121f"/>
  <rect x="17"   y="24.5" width="2.5" height="4" rx="0.5" fill="#12121f"/>
  <rect x="21.5" y="24.5" width="2.5" height="4" rx="0.5" fill="#12121f"/>
  <rect x="26"   y="24.5" width="2.5" height="4" rx="0.5" fill="#12121f"/>
</svg>
